version: "3.9"

services:

  mongodb:
    image: mongo
    container_name: mongodb

    ports:
      - "27017:27017"

    restart: always

  api:
    build: ./backend

    container_name: store-api

    ports:
      - "3000:3000"

    depends_on:
      - mongodb

    environment:
      - MONGO_URI=mongodb://mongodb:27017/store_intelligence

    restart: always